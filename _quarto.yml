project:
  type: website
  resources:
    - papers
    - CNAME
  output-dir: docs  # This line is crucial for GitHub Pages

website:
  title: "Ching-Tse Chen"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: research.qmd
        text: Research
      - href: cv.pdf
        text: CV


format:
  html:
    theme: flatly
    css: styles.css
    link-external-newwindow: true
    include-after-body:
      text: |
        <script>
          // Open all PDF links (CV, paper drafts) in a new tab
          document.querySelectorAll('a[href$=".pdf"]').forEach(function (a) {
            a.setAttribute("target", "_blank");
            a.setAttribute("rel", "noopener");
          });
        </script>